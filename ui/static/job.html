<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job — Tradebot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="tb-header">
    <h1 id="tb-job-title">Job Details</h1>
    <p class="tb-subtitle" id="tb-job-subtitle"></p>
    <a href="/" class="tb-settings-btn tb-back-btn">&#8592; Jobs</a>
  </header>

  <main class="tb-main tb-job-main">
    <div id="tb-status" class="tb-status"></div>

    <section class="tb-card tb-job-actions" id="tb-job-actions" hidden>
      <div class="tb-job-actions-btns">
        <button type="button" id="tb-job-pause-btn" class="tb-button tb-job-action-btn" title="Pause job">&#10074;&#10074; Pause</button>
        <button type="button" id="tb-job-resume-btn" class="tb-button tb-button-secondary tb-job-action-btn" title="Resume job">&#9658; Resume</button>
        <button type="button" id="tb-job-cancel-btn" class="tb-button tb-job-cancel-btn">Cancel</button>
        <span class="tb-job-freeze-status">Freeze: <span id="tb-job-freeze-value">—</span></span>
        <button type="button" id="tb-job-set-option-btn" class="tb-button tb-button-secondary">Set option</button>
      </div>
    </section>

    <div class="tb-job-layout">

      <!-- Left column: summary + stats -->
      <div class="tb-job-left">

        <section class="tb-card tb-detail-card">
          <div class="tb-card-header"><h2>Job</h2></div>
          <dl class="tb-detail-grid" id="tb-summary-grid"></dl>
        </section>

        <section class="tb-card tb-detail-card" id="tb-stats-section" hidden>
          <div class="tb-card-header"><h2>Statistics</h2></div>
          <dl class="tb-detail-grid" id="tb-stats-grid"></dl>
        </section>

      </div>

      <!-- Right column (full width on small): pairs table -->
      <section class="tb-card tb-detail-card tb-pairs-card" id="tb-pairs-section" hidden>
        <div class="tb-card-header tb-pairs-header">
          <h2>Pairs</h2>
          <label class="tb-show-all-label">
            <input type="checkbox" id="tb-show-all-zero-buys" title="Show rows with 0 buys">
            Show All
          </label>
        </div>
        <div class="tb-table-wrapper">
          <table class="tb-table" id="tb-pairs-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Pair</th>
                <th>Budget</th>
                <th>Return</th>
                <th>AnnualReturn</th>
                <th>Days</th>
                <th>Buys</th>
                <th>Sells</th>
                <th>Profit</th>
                <th>Fees</th>
                <th>BoughtValue</th>
                <th>SoldValue</th>
                <th>UnsoldValue</th>
                <th>SoldSize</th>
                <th>UnsoldSize</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </div>
  </main>

  <div id="tb-set-option-backdrop" class="tb-modal-backdrop" hidden>
    <div id="tb-set-option-modal" class="tb-modal tb-set-option-modal">
      <div class="tb-modal-header">
        <h3>Set option</h3>
        <button type="button" id="tb-set-option-close" class="tb-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="tb-modal-body">
        <p id="tb-set-option-paused-msg" class="tb-set-option-paused-msg" hidden>Job must be paused to set options. Pause the job first, then open this dialog again.</p>
        <div id="tb-set-option-form-wrap">
          <div class="tb-form-group">
            <label for="tb-set-option-freeze">Freeze</label>
            <select id="tb-set-option-freeze">
              <option value="none">none</option>
              <option value="buys">buys</option>
              <option value="sells">sells</option>
              <option value="both">both</option>
            </select>
          </div>
        </div>
      </div>
      <div class="tb-modal-footer">
        <button type="button" id="tb-set-option-apply" class="tb-button">Apply</button>
        <button type="button" id="tb-set-option-cancel" class="tb-button tb-button-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/job.js"></script>
</body>
</html>
