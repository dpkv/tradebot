<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <radialGradient id="antennaglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FEFCE8"/>
      <stop offset="60%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Antenna stem -->
  <rect x="47" y="8" width="6" height="14" rx="3" fill="#6366F1"/>
  <!-- Antenna ball with glow -->
  <circle cx="50" cy="8" r="8" fill="url(#antennaglow)" filter="url(#glow)"/>
  <circle cx="47" cy="5" r="2.5" fill="white" opacity="0.7"/>

  <!-- Robot head -->
  <rect x="10" y="20" width="80" height="68" rx="14" fill="url(#head)"/>
  <!-- Top highlight -->
  <rect x="10" y="20" width="80" height="22" rx="14" fill="white" opacity="0.1"/>

  <!-- Ear bolts -->
  <circle cx="5"  cy="55" r="7" fill="#4338CA"/>
  <circle cx="5"  cy="55" r="3.5" fill="#818CF8"/>
  <circle cx="95" cy="55" r="7" fill="#4338CA"/>
  <circle cx="95" cy="55" r="3.5" fill="#818CF8"/>

  <!-- Eye visor panel -->
  <rect x="17" y="30" width="66" height="27" rx="8" fill="#0D0B2B"/>

  <!-- Left eye: $ sign -->
  <text x="38" y="51"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', Arial, sans-serif"
        font-weight="900"
        font-size="21"
        fill="#10B981"
        filter="url(#glow)">$</text>

  <!-- Right eye: ascending chart -->
  <polyline points="56,51 62,42 68,47 75,36"
            stroke="#FCD34D" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#glow)"/>
  <circle cx="75" cy="36" r="3" fill="#FCD34D" filter="url(#glow)"/>

  <!-- Blush cheeks -->
  <ellipse cx="21" cy="65" rx="8"  ry="5" fill="#F9A8D4" opacity="0.5"/>
  <ellipse cx="79" cy="65" rx="8"  ry="5" fill="#F9A8D4" opacity="0.5"/>

  <!-- Smile -->
  <path d="M 36,75 Q 50,83 64,75"
        stroke="#10B981" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
</svg>
